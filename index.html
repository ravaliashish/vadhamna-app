<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vadhamna Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #F9F7F2; color: #1A1A1A; }
        .font-ink { font-family: 'Georgia', serif; }
        .pending-card { border-left: 4px solid #f59e0b; background-color: #fffaf0; }
        .returned-card { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="font-ink">
    <header class="sticky top-0 bg-[#F9F7F2]/90 backdrop-blur-md border-b border-black/10 p-6 z-10">
        <h1 class="text-xs uppercase tracking-widest opacity-50 mb-1">Total Vadhamna</h1>
        <div id="grandTotal" class="text-4xl font-light">₹ 0</div>
        
        <div class="mt-4 flex gap-2">
            <input type="text" id="searchInput" placeholder="Search name or city..." 
                   class="w-full p-2 bg-transparent border-b border-black/20 focus:outline-none focus:border-black font-sans text-sm">
        </div>
    </header>

    <main id="entriesList" class="p-6 space-y-4 pb-32"></main>

    <button onclick="toggleModal()" class="fixed bottom-8 right-8 bg-[#1A1A1A] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl z-20">+</button>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm p-6 flex items-center justify-center z-30">
        <div class="bg-[#F9F7F2] w-full max-w-md p-8 rounded-lg shadow-2xl">
            <h2 class="text-2xl mb-6 midnight-ink">New Entry</h2>
            
            <div class="space-y-4 font-sans">
                <input type="text" id="nameInp" placeholder="Full Name" class="w-full p-2 border-b border-black/20 bg-transparent outline-none">
                <input type="text" id="placeInp" placeholder="Place / City" class="w-full p-2 border-b border-black/20 bg-transparent outline-none">
                <input type="number" id="amountInp" placeholder="Amount (₹)" class="w-full p-2 border-b border-black/20 bg-transparent outline-none">
                
                <div>
                    <label class="text-[10px] uppercase opacity-50 block mb-1">Occasion For</label>
                    <select id="occasionInp" class="w-full p-2 border-b border-black/20 bg-transparent outline-none">
                        <option value="His/Her Own Marriage">His/Her Own Marriage</option>
                        <option value="Son's Marriage">Son's Marriage</option>
                        <option value="Daughter's Marriage">Daughter's Marriage</option>
                        <option value="Other">Other Event</option>
                    </select>
                </div>

                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="trackReturn" class="w-4 h-4">
                    <label for="trackReturn" class="text-sm">Expect return for Brother's Wedding?</label>
                </div>
            </div>

            <div class="flex justify-between mt-8 font-sans">
                <button onclick="toggleModal()" class="opacity-50">Cancel</button>
                <button onclick="addEntry()" class="bg-[#1A1A1A] text-white px-8 py-2 rounded">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
