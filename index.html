<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vadhamna Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #F9F7F2; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        .font-ink { font-family: 'Georgia', serif; }
        .card { background: white; border: 1px solid rgba(0,0,0,0.05); transition: all 0.2s; }
        .pending-border { border-left: 4px solid #d4af37; } /* Gold color for blessings */
    </style>
</head>
<body class="font-ink">
    <header class="sticky top-0 bg-[#F9F7F2]/90 backdrop-blur-md border-b border-black/10 p-6 z-10">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-xs uppercase tracking-widest opacity-50">Total Vadhamna</h1>
            <button onclick="exportData()" class="text-[10px] uppercase underline opacity-40">Export CSV</button>
        </div>
        <div id="grandTotal" class="text-4xl font-light">₹ 0</div>
        <input type="text" id="searchInput" placeholder="Search name or city..." 
               class="w-full mt-4 p-2 bg-transparent border-b border-black/20 focus:outline-none focus:border-black font-sans text-sm">
    </header>

    <main id="entriesList" class="p-4 space-y-3 pb-32"></main>

    <button onclick="toggleModal()" class="fixed bottom-8 right-8 bg-[#1A1A1A] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl z-20">+</button>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm p-6 flex items-center justify-center z-30">
        <div class="bg-[#F9F7F2] w-full max-w-md p-8 rounded-lg shadow-2xl relative">
            <h2 class="text-xl mb-6">New Entry</h2>
            
            <div class="space-y-4 font-sans">
                <input type="text" id="nameInp" placeholder="Full Name" class="w-full p-2 border-b border-black/10 bg-transparent outline-none">
                <input type="text" id="placeInp" placeholder="Place / City" class="w-full p-2 border-b border-black/10 bg-transparent outline-none">
                <input type="number" id="amountInp" placeholder="Amount (₹)" class="w-full p-2 border-b border-black/10 bg-transparent outline-none">
                
                <select id="occasionInp" class="w-full p-2 border-b border-black/10 bg-transparent outline-none text-sm opacity-70">
                    <option value="Marriage">Their Marriage</option>
                    <option value="Son's Marriage">Son's Marriage</option>
                    <option value="Daughter's Marriage">Daughter's Marriage</option>
                    <option value="General">General Blessing</option>
                </select>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="trackReturn" class="w-4 h-4" checked>
                    <label for="trackReturn" class="text-xs opacity-70">Acknowledge at Brother's Wedding?</label>
                </div>
            </div>

            <div class="flex flex-col gap-3 mt-8 font-sans">
                <button onclick="addEntry(false)" class="bg-[#1A1A1A] text-white py-3 rounded-md">Save & Close</button>
                <button onclick="addEntry(true)" class="border border-black/20 py-3 rounded-md text-sm">Save & Add Next (Quick Mode)</button>
                <button onclick="toggleModal()" class="text-xs opacity-40 py-2">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
